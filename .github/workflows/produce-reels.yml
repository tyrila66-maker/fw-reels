name: Produce reels

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      reel_id:
        description: "Force-produce this queue item id"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: produce-reels
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pipeline deps
        run: npm ci
        working-directory: pipeline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install python deps + browser
        run: |
          pip install httpx playwright
          playwright install --with-deps chromium
      - name: Produce next reel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_REEL_ID: ${{ inputs.reel_id }}
        run: python scripts/produce.py
